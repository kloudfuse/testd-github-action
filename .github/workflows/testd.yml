name: TestD E2E Tests

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      base_branch:
        required: false
        type: string
        default: main
      pr_number:
        required: true
        type: string
      actor:
        required: true
        type: string
      repository:
        required: true
        type: string
      environments:
        required: false
        type: string
        default: '["mock"]'
    secrets:
      TESTD_JWT_TOKEN:
        required: true
      GH_TOKEN:
        required: true

jobs:
  start_run:
    name: Start TestD Run
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.start_run.outputs.run_id }}
    steps:
      - name: Start TestD run
        id: start_run
        env:
          BRANCH: ${{ inputs.branch }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          ACTOR: ${{ inputs.actor }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          ENVIRONMENTS: ${{ inputs.environments }}
        run: |
          USER_EMAIL=$(gh api "users/$ACTOR" --jq '.email // empty')
          USER_EMAIL="${USER_EMAIL:-$ACTOR}"

          PAYLOAD=$(jq -n \
            --arg branch "$BRANCH" \
            --arg baseBranch "$BASE_BRANCH" \
            --arg email "$USER_EMAIL" \
            --argjson environments "$ENVIRONMENTS" \
            '{"branch": $branch, "baseBranch": $baseBranch, "environments": $environments, "userEmail": $email}')
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.TESTD_JWT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            https://testd.kloudfuse.dev/api/runs) || {
            echo "curl failed with exit code $?"
            exit 1
          }

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Response body: $BODY"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Failed to start TestD run (HTTP $HTTP_CODE)"
            exit 1
          fi

          RUN_ID=$(echo "$BODY" | jq -r '.id')
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Started TestD run: $RUN_ID"

      - name: Post loading comment
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RUN_ID: ${{ steps.start_run.outputs.run_id }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.repository }}
        run: |
          STARTED_AT=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          BODY=$(printf "## testd Summary\n\n:hourglass_flowing_sand: Tests are running...\n\nStarted at: %s\n\nhttps://testd.kloudfuse.dev/runs/%s" "$STARTED_AT" "$RUN_ID")
          PAYLOAD=$(jq -n --arg body "$BODY" '{"body": $body}')

          EXISTING_ID=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | startswith("## testd Summary")) | .id' | head -1)

          if [ -n "$EXISTING_ID" ]; then
            echo "$PAYLOAD" | gh api "repos/$REPO/issues/comments/$EXISTING_ID" -X PATCH --input -
          else
            echo "$PAYLOAD" | gh api "repos/$REPO/issues/$PR_NUMBER/comments" -X POST --input -
          fi

  poll_and_summarize:
    name: TestD Poll & Summarize
    needs: start_run
    runs-on: ubuntu-latest
    steps:
      - name: Poll run until complete
        id: poll
        env:
          RUN_ID: ${{ needs.start_run.outputs.run_id }}
        run: |
          echo "Polling run $RUN_ID..."
          while true; do
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.TESTD_JWT_TOKEN }}" \
              "https://testd.kloudfuse.dev/api/runs/$RUN_ID") || {
              echo "curl failed with exit code $?"
              exit 1
            }

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | head -n-1)

            if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
              echo "Failed to poll run (HTTP $HTTP_CODE): $BODY"
              exit 1
            fi

            STATUS=$(echo "$BODY" | jq -r '.status')
            TESTS_RUN=$(echo "$BODY" | jq -r '.testsRunCount // 0')
            TESTS_SUCCESS=$(echo "$BODY" | jq -r '.testsSuccessCount // 0')
            echo "Run status: $STATUS ($TESTS_SUCCESS/$TESTS_RUN passed)"

            case "$STATUS" in
              pending|running)
                sleep 10
                ;;
              *)
                echo "run_payload<<PAYLOAD_EOF" >> "$GITHUB_OUTPUT"
                echo "$BODY" >> "$GITHUB_OUTPUT"
                echo "PAYLOAD_EOF" >> "$GITHUB_OUTPUT"
                echo "Run finished with status: $STATUS"
                break
                ;;
            esac
          done

      - name: Post PR comment
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RUN_PAYLOAD: ${{ steps.poll.outputs.run_payload }}
          RUN_ID: ${{ needs.start_run.outputs.run_id }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.repository }}
        run: |
          RECORDINGS=$(echo "$RUN_PAYLOAD" | jq -c '.recordings')
          TOTAL=$(echo "$RECORDINGS" | jq 'length')
          FAILURES=$(echo "$RECORDINGS" | jq '[.[] | select(.status != "passed")] | length')
          COMMENT_FILE=$(mktemp)

          # Sort: failed recordings first, then passed
          SORTED=$(echo "$RECORDINGS" | jq -c '[(.[] | select(.status != "passed")), (.[] | select(.status == "passed"))]')

          if [ "$FAILURES" -eq 0 ]; then
            SUMMARY=":white_check_mark: All $TOTAL tests passed!"
          else
            SUMMARY=":x: $FAILURES of $TOTAL failed!"
          fi

          printf "## testd Summary\n\n%s\n\nhttps://testd.kloudfuse.dev/runs/%s\n" "$SUMMARY" "$RUN_ID" >> "$COMMENT_FILE"

          while IFS= read -r recording; do
            TEST_NAME=$(echo "$recording" | jq -r '.testName')
            STATUS=$(echo "$recording" | jq -r '.status')

            if [ "$STATUS" = "passed" ]; then
              printf '\n<details>\n<summary>:white_check_mark: <b>%s</b></summary>\n\n' "$TEST_NAME" >> "$COMMENT_FILE"
            else
              printf '\n### :x: %s\n\n' "$TEST_NAME" >> "$COMMENT_FILE"
            fi

            while IFS= read -r screenshot; do
              EXPECTED_URL=$(echo "$screenshot" | jq -r '.expectedImageUrl // empty')
              DIFF_URL=$(echo "$screenshot" | jq -r '.diffImageUrl // empty')
              RECEIVED_URL=$(echo "$screenshot" | jq -r '.receivedImageUrl // empty')

              if [ -z "$EXPECTED_URL" ]; then
                # Single column mode — no baseline image (matches DiffTable singleColumn)
                if [ "$STATUS" != "passed" ]; then
                  RCV_LABEL="🔴 <b>RECEIVED</b>"
                else
                  RCV_LABEL="🔵 <b>RECEIVED</b>"
                fi
                {
                  echo '<table>'
                  echo '<tr>'
                  printf '<td align="center"><img src="%s" width="280"></td>\n' "$RECEIVED_URL"
                  echo '</tr>'
                  echo '<tr>'
                  printf '<td align="center">%s</td>\n' "$RCV_LABEL"
                  echo '</tr>'
                  echo '</table>'
                  echo ''
                } >> "$COMMENT_FILE"
              else
                # Three column mode — Expected | Diff | Received (matches DiffTable default)
                if [ -n "$DIFF_URL" ]; then
                  DIFF_CELL=$(printf '<img src="%s" width="280">' "$DIFF_URL")
                  DIFF_LABEL="🔴 <b>DIFF</b>"
                  RCV_LABEL="🔴 <b>RECEIVED</b>"
                else
                  DIFF_CELL=""
                  DIFF_LABEL="<b>DIFF</b>"
                  RCV_LABEL="🟢 <b>RECEIVED</b>"
                fi
                {
                  echo '<table>'
                  echo '<tr>'
                  printf '<td align="center" width="33%%"><img src="%s" width="280"></td>\n' "$EXPECTED_URL"
                  printf '<td align="center" width="33%%">%s</td>\n' "$DIFF_CELL"
                  printf '<td align="center" width="33%%"><img src="%s" width="280"></td>\n' "$RECEIVED_URL"
                  echo '</tr>'
                  echo '<tr>'
                  echo '<td align="center"><b>EXPECTED</b></td>'
                  printf '<td align="center">%s</td>\n' "$DIFF_LABEL"
                  printf '<td align="center">%s</td>\n' "$RCV_LABEL"
                  echo '</tr>'
                  echo '</table>'
                  echo ''
                } >> "$COMMENT_FILE"
              fi
            done < <(echo "$recording" | jq -c '.screenshots[]')

            if [ "$STATUS" = "passed" ]; then
              printf '</details>\n' >> "$COMMENT_FILE"
            fi
          done < <(echo "$SORTED" | jq -c '.[]')

          FINAL=$(cat "$COMMENT_FILE")
          PAYLOAD=$(jq -n --arg body "$FINAL" '{"body": $body}')

          EXISTING_ID=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | startswith("## testd Summary")) | .id' | head -1)

          if [ -n "$EXISTING_ID" ]; then
            echo "$PAYLOAD" | gh api "repos/$REPO/issues/comments/$EXISTING_ID" -X PATCH --input -
          else
            echo "$PAYLOAD" | gh api "repos/$REPO/issues/$PR_NUMBER/comments" -X POST --input -
          fi